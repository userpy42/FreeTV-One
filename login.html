<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi — FreeTv One</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-logo"><a href="index.html">FreeTv <span>One</span></a></div>
  </nav>

  <!-- ===== AUTH BOX ===== -->
  <main class="auth-container">

    <!-- Tabs per scegliere Login o Registrazione -->
    <div class="auth-tabs">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Accedi</button>
      <button class="tab-btn" id="tab-register" onclick="showTab('register')">Registrati</button>
    </div>

    <!-- Messaggio di errore / successo -->
    <div class="auth-message" id="auth-message"></div>

    <!-- ===== FORM LOGIN ===== -->
    <div id="form-login" class="auth-form">
      <h2>Bentornato!</h2>
      <p class="form-sub">Inserisci le tue credenziali per accedere.</p>

      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="esempio@email.com" />

      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="La tua password" />

      <button class="btn-primary" onclick="login()">Accedi</button>

      <p class="form-switch">Non hai un account? <a onclick="showTab('register')">Registrati</a></p>
    </div>

    <!-- ===== FORM REGISTRAZIONE ===== -->
    <div id="form-register" class="auth-form" style="display:none;">
      <h2>Crea account</h2>
      <p class="form-sub">Registrati gratuitamente per iniziare.</p>

      <label for="reg-name">Nome</label>
      <input type="text" id="reg-name" placeholder="Il tuo nome" />

      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" placeholder="esempio@email.com" />

      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="Scegli una password" />

      <label for="reg-password2">Conferma Password</label>
      <input type="password" id="reg-password2" placeholder="Ripeti la password" />

      <button class="btn-primary" onclick="register()">Registrati</button>

      <p class="form-switch">Hai già un account? <a onclick="showTab('login')">Accedi</a></p>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>© 2025 FreeTv One — Progetto scolastico</p>
  </footer>

  <!-- Script -->
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
